services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-roadway}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-roadway_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-roadway_ai}
    ports:
      # Host port 5433, not 5432 — this machine's native PostgreSQL 18
      # service already owns 5432. Only affects host-side connections (e.g.
      # local Streamlit testing); containers still reach it at postgres:5432.
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-roadway}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://roadway:roadway_dev_password@postgres:5432/roadway_ai}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - backend_storage:/app/storage
      - backend_chroma:/app/chroma_data

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  backend_storage:
  backend_chroma:
