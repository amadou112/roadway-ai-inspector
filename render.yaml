# No `databases:` section on purpose — Render's blueprint Postgres has no
# free plan (basic-256mb minimum, requires a card). Instead, use a genuinely
# free external Postgres (e.g. Neon.tech, no card required) and paste its
# connection string into DATABASE_URL when applying this blueprint.
#
# No persistent disk either (free web services can't attach one) — the
# container's local filesystem (uploaded files, Chroma vectors) resets on
# every restart/redeploy. The seed script re-ingests the two sample spec
# documents on every boot specifically to handle this cleanly.

services:
  - name: roadway-ai-backend
    type: web
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      # Paste a free Postgres connection string here (e.g. from neon.tech) —
      # postgres:// or postgresql:// both work, the app normalizes the driver.
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "480"
      # Left blank on purpose: the public deployment runs in "stub mode" (see
      # app/services/llm_provider.py) with no real OpenAI calls, so it can't
      # rack up API cost no matter how much traffic it gets. Only add a real
      # key here (Render dashboard > Environment) for a deliberate, temporary
      # live demo, and remove it again afterward.
      - key: OPENAI_API_KEY
        value: ""
      - key: OPENAI_CHAT_MODEL
        value: gpt-4o-mini
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: FRONTEND_ORIGIN
        sync: false
